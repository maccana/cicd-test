site_name: API English Glossary
site_url: https://maccana.github.io/api-english-portal/

theme:
  name: material
  palette:
    scheme: slate

plugins:
  - search
  - blog:
      post_dir: blog/posts
      blog_dir: blog
      # Define the author explicitly inside the plugin itself
      authors: true
      authors_file: authors.yml

nav:
  - Home: index.md
  - Blog: blog/index.md   # <--- Point directly to the file
  - Pipeline Test: test2.md