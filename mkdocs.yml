site_name: API English Glossary
site_description: Documentation and coaching for API Technical Writing.
site_url: https://your-username.github.io/cicd-test/

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.instant
    - navigation.tracking
    - content.code.copy

plugins:
  - search
  - blog:
      post_dir: blog/posts
      blog_dir: blog
      authors:
        mike:
          name: Mike McCann
          url: https://github.com/maccana
          avatar: https://github.com/maccana.png

# You can keep 'extra' for other site-wide settings later, 
# but we've moved the author logic to where it's most needed.
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/maccana

nav:
  - Home: index.md
  - Blog: 
    - blog/index.md
  - Pipeline Test: test2.md