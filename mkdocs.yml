site_name: API English Glossary
site_description: Documentation and coaching for API Technical Writing.
site_url: https://your-username.github.io/cicd-test/

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.instant
    - navigation.tracking
    - content.code.copy

plugins:
  - search
  - blog:
      post_dir: blog/posts
      blog_dir: blog
      post_url_format: "{year}/{month}/{day}/{slug}"

extra:
  blog:
    authors:
      mike:
        name: Mike McCann
        url: https://github.com/your-username
        avatar: https://github.com/your-username.png

nav:
  - Home: index.md
  - Blog: 
    - blog/index.md
  - Pipeline Test: test2.md